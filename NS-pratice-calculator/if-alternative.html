<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> if-alternative</title>
</head>
<body>
    <script>
        let age = 8;
        let result;
        if(age > 18 ){
            result = 'Adult';
        }
        else{
            result = 'kid'
        }
        console.log(result);
    </script>
</body>
</html>
